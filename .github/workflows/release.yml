name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-web:
    name: Publish npm package and demo
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build npm package
        run: npm ci && npm run build

      - name: Publish to npm
        run: npm publish

      - name: Build phaser-example
        working-directory: phaser-example
        run: npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy phaser-example/dist --project-name=pixel-tools-phaser-example --branch=main

  build-binaries:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - os: windows
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            binary_suffix: .exe
          - os: linux
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_suffix: ''
          - os: mac-intel
            runner: macos-15
            goos: darwin
            goarch: amd64
            binary_suffix: ''
          - os: mac-m1
            runner: macos-15
            goos: darwin
            goarch: arm64
            binary_suffix: ''

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: '1.24'

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY_SUFFIX: ${{ matrix.binary_suffix }}
        run: make build

      - name: Import Apple certificate
        if: matrix.goos == 'darwin'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign macOS binaries
        if: matrix.goos == 'darwin'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Sergei Khoroshavin ($APPLE_TEAM_ID)"
          for binary in bin/*; do
            echo "Signing $binary..."
            codesign --force --options runtime \
              --sign "$IDENTITY" --timestamp "$binary"
            codesign --verify --verbose "$binary"
          done

      - name: Package binaries
        env:
          OS: ${{ matrix.os }}
        run: |
          OUTPUT_NAME="pixel-tools-${OS}"

          mkdir -p dist/${OUTPUT_NAME}

          cp -v bin/* dist/${OUTPUT_NAME}/
          mkdir -p dist/${OUTPUT_NAME}/examples
          cp -rv cmd/atlaspack/example dist/${OUTPUT_NAME}/examples/atlaspack
          cp -rv cmd/fontpack/example dist/${OUTPUT_NAME}/examples/fontpack
          cp -rv cmd/tilepack/example dist/${OUTPUT_NAME}/examples/tilepack
          cp -v cmd/recolor/recolor-config.yaml dist/${OUTPUT_NAME}/
          cp -v cmd/recolor/tf_to_e.lut dist/${OUTPUT_NAME}/

          cd dist
          find .
          zip -r ${OUTPUT_NAME}.zip ${OUTPUT_NAME}/
          cd ..

      - name: Notarize macOS package
        if: matrix.goos == 'darwin'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          OS: ${{ matrix.os }}
        run: |
          xcrun notarytool submit "dist/pixel-tools-${OS}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pixel-tools-${{ matrix.os }}
          path: dist/pixel-tools-${{ matrix.os }}.zip

      - name: Clean up keychain
        if: always() && matrix.goos == 'darwin'
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$CERTIFICATE_PATH"

  publish-github:
    name: Publish to GitHub
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Publish to GitHub
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            dist/pixel-tools-windows/pixel-tools-windows.zip
            dist/pixel-tools-linux/pixel-tools-linux.zip
            dist/pixel-tools-mac-intel/pixel-tools-mac-intel.zip
            dist/pixel-tools-mac-m1/pixel-tools-mac-m1.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-itch:
    name: Publish to itch.io (${{ matrix.os }})
    needs: build-binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os:
          - windows
          - linux
          - mac-intel
          - mac-m1

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pixel-tools-${{ matrix.os }}
          path: dist

      - name: Publish to itch.io
        uses: XanatosX/butler-publish-itchio-action@fb0a6f13954b75e8fbcfb703dbdb8626452efaba
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: ${{ matrix.os }}
          ITCH_GAME: pixel-tools
          ITCH_USER: skhoroshavin
          PACKAGE: dist/pixel-tools-${{ matrix.os }}.zip
          VERSION: ${{ github.ref_name }}
